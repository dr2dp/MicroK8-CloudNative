<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TKU MicroK8s Pod</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #58d6c8;
    }
    #logo {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #logo:hover {
      transform: scale(1.05);
      filter: drop-shadow(0 0 24px #58d6c8aa);
    }
    #logo:active { transform: scale(0.96); }
    .hint {
      margin-top: 14px;
      font-size: 0.78rem;
      color: #2e8b84;
      letter-spacing: 0.08em;
    }
    .pod-info {
      margin-top: 28px;
      background: #161b22;
      border: 1px solid #1e8c84;
      border-radius: 10px;
      padding: 18px 32px;
      text-align: center;
      min-width: 320px;
    }
    .pod-info .label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: #2e8b84;
      text-transform: uppercase;
    }
    .pod-info .value {
      font-size: 1.1rem;
      color: #58d6c8;
      margin-top: 4px;
      margin-bottom: 14px;
      word-break: break-all;
    }
    .pod-info .value:last-child { margin-bottom: 0; }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3fb950;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <img id="logo" src="/static/logo.jpg" onclick="playSound()" />
  <p class="hint">click the shark</p>
  <div class="pod-info">
    <p class="label">Container Name</p>
    <p class="value">{{ hostname }}</p>
    <p class="label">Pod IP</p>
    <p class="value"><span class="dot"></span>{{ pod_ip }}</p>
  </div>

	<script>
	  const sound = new Audio('/static/honk.mp3');
	  function playSound() {
		sound.currentTime = 0;
		sound.play();
	  }
	</script>
</body>
</html>
